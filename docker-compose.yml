services:
  web:
    build: .
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn i3aps_platform.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 90"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "X-Forwarded-Proto: https", "http://127.0.0.1:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: celery -A i3aps_platform worker -l INFO
    env_file: .env
    depends_on:
      - web
      - redis
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-i3aps}
      POSTGRES_USER: ${POSTGRES_USER:-i3aps}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-i3aps}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-i3aps} -d ${POSTGRES_DB:-i3aps}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    depends_on:
      - web
    volumes:
      - ./deploy/nginx/i3aps.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/var/www/static:ro
      - media:/var/www/media:ro

volumes:
  postgres_data:
  redis_data:
  staticfiles:
  media:
